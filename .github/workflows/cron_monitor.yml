name: Fund Monitor (Trading Hours)

on:
  schedule:
    # 北京时间 09:30-11:30 (UTC 01:30-03:30)
    # 每10分钟运行一次
    - cron: '0,10,20,30,40,50 1-3 * * 1-5'
    
    # 北京时间 13:00-15:10 (UTC 05:00-07:10)
    # 每10分钟运行一次
    - cron: '0,10,20,30,40,50 5-7 * * 1-5'
  
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run monitor task
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        MAIL_USER: ${{ secrets.MAIL_USER }}
        MAIL_SENDER: ${{ secrets.MAIL_SENDER }}
      run: python monitor_task.py
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: monitor-logs-${{ github.run_number }}
        path: |
          *.log
        retention-days: 7
