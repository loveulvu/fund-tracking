name: Fund Data Update (Weekday Evening)

on:
  schedule:
    # Beijing/Japan 20:00 ~= UTC 11:00, Monday-Friday
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required config
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
        run: |
          if [ -z "$BACKEND_BASE_URL" ]; then
            echo "BACKEND_BASE_URL secret is required"
            exit 1
          fi

      - name: Trigger update endpoint
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          UPDATE_API_KEY: ${{ secrets.UPDATE_API_KEY }}
        run: |
          set -euo pipefail
          URL="${BACKEND_BASE_URL%/}/api/update"
          echo "Triggering: $URL"

          if [ -n "${UPDATE_API_KEY:-}" ]; then
            curl --fail --show-error --silent \
              --max-time 120 \
              --retry 2 --retry-delay 3 \
              -H "X-Update-Key: ${UPDATE_API_KEY}" \
              -o update-response.json \
              "$URL"
          else
            curl --fail --show-error --silent \
              --max-time 120 \
              --retry 2 --retry-delay 3 \
              -o update-response.json \
              "$URL"
          fi

      - name: Summarize update response
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("update-response.json")
          if not path.exists():
              print("update-response.json was not created")
              raise SystemExit(0)

          try:
              data = json.loads(path.read_text())
          except Exception as exc:
              print(f"Failed to parse update-response.json: {exc}")
              raise SystemExit(0)

          print(f"status={data.get('status')}")
          print(f"total={data.get('total')}")
          print(f"updated={data.get('updated')}")
          print(f"failed_codes={data.get('failed_codes')}")
          PY

      - name: Upload update response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-response-${{ github.run_number }}
          path: update-response.json
          retention-days: 7
